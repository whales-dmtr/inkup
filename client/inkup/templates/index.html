<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>InkUp | Homepage</title>
    <link rel="stylesheet" type="text/css" href="/static/styles/index.css">
    <link rel="stylesheet" type="text/css" href="/static/styles/common.css">
    <link rel="stylesheet" type="text/css" href="/static/styles/elements/sidebar.css">
</head>

<body>
    <main class="main">
        {% for post in data %}
        <div class="post">
            <h3>{{ post.author_username }}</h3>
            <p>{{ post.content }}</p>
        </div>
        {% endfor %}
    </main>

    <sidebar class="sidebar">
        <div class="search">
            <form>
                <input type="text" id="search-inp" placeholder="Will AI replace swe in 2026?">
                <button type="submit" id="search-submit">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" id="magnifying-glass">
                        <path
                            d="M480 272C480 317.9 465.1 360.3 440 394.7L566.6 521.4C579.1 533.9 579.1 554.2 566.6 566.7C554.1 579.2 533.8 579.2 521.3 566.7L394.7 440C360.3 465.1 317.9 480 272 480C157.1 480 64 386.9 64 272C64 157.1 157.1 64 272 64C386.9 64 480 157.1 480 272zM272 416C351.5 416 416 351.5 416 272C416 192.5 351.5 128 272 128C192.5 128 128 192.5 128 272C128 351.5 192.5 416 272 416z" />
                    </svg>
                </button>
            </form>
        </div>
        <div class="account">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" id="user-icon">
                <path
                    d="M320 312C386.3 312 440 258.3 440 192C440 125.7 386.3 72 320 72C253.7 72 200 125.7 200 192C200 258.3 253.7 312 320 312zM290.3 368C191.8 368 112 447.8 112 546.3C112 562.7 125.3 576 141.7 576L498.3 576C514.7 576 528 562.7 528 546.3C528 447.8 448.2 368 349.7 368L290.3 368z" />
            </svg>
            <div class="links">
                <p>
                    <a href="">Log in</a> |
                    <a href="">Sign up</a>
                </p>
            </div>
        </div>
    </sidebar>
    <script src="../scripts/index.js"></script>
</body>

</html>
